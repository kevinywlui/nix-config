name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Run pre-commit
        # Tools come from the flake devShell, i.e. the exact versions locked
        # in flake.lock — the same nixpkgs release the hosts install them
        # from. Installing from a floating channel here previously let CI's
        # shfmt drift ahead of the shfmt that formatted the tree, breaking
        # main on formatting no local hook ever produced.
        run: nix develop --command pre-commit run --all-files --show-diff-on-failure

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        host: [fw13, t480]
    steps:
      - name: Free runner disk space
        # Full system closures need more room than the stock runner's free
        # ~20GB. Dropping the large preinstalled toolchains recovers ~30GB.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force > /dev/null
          df -h /

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so the closure-diff step can check out the merge-base.
          fetch-depth: 0

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Build ${{ matrix.host }} system closure
        # The actual stability gate: builds the same toplevel derivation
        # `nh os build` produces locally. The previous --dry-run only
        # instantiated the derivation graph, so real build failures (broken
        # patches, failing source builds, bad hashes) sailed through CI.
        run: nix build -L .#checks.x86_64-linux.${{ matrix.host }} -o result-new

      - name: Build merge-base closure for diff
        if: github.event_name == 'pull_request'
        # Build what the target branch produces so nvd can diff against it.
        # Cheap in practice: the store already holds everything shared with
        # the PR build. A broken base is downgraded to a warning — the PR
        # itself already passed the gate above.
        run: |
          base="$(git merge-base "origin/${{ github.base_ref }}" HEAD)"
          git -c advice.detachedHead=false checkout "$base"
          nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel -o result-base ||
            echo "::warning title=Closure diff skipped (${{ matrix.host }})::merge-base $base failed to build"
          git checkout -

      - name: Closure diff (nvd)
        if: github.event_name == 'pull_request'
        # CI half of the repo's `nh os build` + nvd contract: every package
        # addition, removal, and version change is surfaced at review time.
        # Removals warn rather than fail — intentional removals are
        # legitimate, but silent ones must be visible to the reviewer.
        run: |
          if [ ! -e result-base ]; then
            echo "No merge-base closure; diff skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          diff="$(nix develop --command nvd diff ./result-base ./result-new)"
          echo "$diff"
          {
            echo "## nvd closure diff: ${{ matrix.host }}"
            echo '```'
            echo "$diff"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if echo "$diff" | grep -q '^\[R'; then
            echo "::warning title=Packages removed on ${{ matrix.host }}::nvd reports removed packages — verify each is intentional (see job summary)."
          fi
