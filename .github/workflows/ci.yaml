name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install Dev Tools
        run: |
          nix profile install nixpkgs#pre-commit \
                              nixpkgs#gitleaks \
                              nixpkgs#shellcheck \
                              nixpkgs#shfmt \
                              nixpkgs#nixpkgs-fmt \
                              nixpkgs#deadnix \
                              nixpkgs#go

      - name: Run Pre-Commit
        # This runs all hooks defined in .pre-commit-config.yaml
        # ensuring linting, formatting, and secret scanning pass.
        run: pre-commit run --all-files --show-diff-on-failure

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host: [fw13, t480]
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Dry-run build ${{ matrix.host }}
        # Instantiates the full derivation graph and resolves all dependencies
        # without downloading or building packages. Catches build failures that
        # `nix flake check --no-build` misses.
        run: |
          nix build --dry-run \
            ./nix#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel
