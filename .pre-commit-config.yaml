repos:
  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks
        entry: gitleaks detect --redact --verbose --no-git
        language: system
        pass_filenames: false

      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
        exclude: |
          (?x)^(
            base/core/\.zshrc|
            .*/\.zprofile|
            base/core/\.p10k\.zsh|
            .*\.zsh
          )$

      - id: shfmt
        name: shfmt
        entry: shfmt -l -w
        language: system
        types: [shell]
        exclude: |
          (?x)^(
            base/core/\.zshrc|
            .*/\.zprofile|
            base/core/\.p10k\.zsh|
            .*\.zsh
          )$

      - id: nixpkgs-fmt
        name: nixpkgs-fmt
        entry: nixpkgs-fmt
        language: system
        types: [nix]

      # Flags dead Nix: unused let-bindings and unused module/function
      # arguments (e.g. an unused `config`/`inputs` in a `{ ... }:` header).
      - id: deadnix
        name: deadnix
        entry: deadnix --fail
        language: system
        types: [nix]

      # Go hooks scoped to apps/gtd. gofmt -w -l mirrors the shfmt hook above:
      # it rewrites in place and lists what it touched, so pre-commit fails the
      # run on any file it had to reformat.
      - id: gofmt
        name: gofmt
        entry: gofmt -w -l
        language: system
        types: [go]

      - id: go-vet
        name: go vet
        entry: bash -c 'cd apps/gtd && go vet ./...'
        language: system
        types: [go]
        pass_filenames: false

      - id: nix-flake-check
        name: nix flake check
        entry: nix flake check --no-build
        language: system
        files: ^(nix/.*|flake\.nix|flake\.lock)$
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
