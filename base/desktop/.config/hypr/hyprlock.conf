auth {
    fingerprint {
        enabled = true
        ready_message = Touch fingerprint sensor to unlock
        present_message = Scanning...
        retry_delay = 250
    }
}

background {
    monitor =
    color = rgba(29, 32, 33, 1.0)
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(221, 221, 221, 1.0)
    font_size = 80
    font_family = MesloLGS Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %-d")"
    color = rgba(168, 153, 132, 1.0)
    font_size = 18
    font_family = MesloLGS Nerd Font
    position = 0, 0
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    outer_color = rgb(69, 133, 136)
    inner_color = rgb(40, 40, 40)
    font_color = rgb(221, 221, 221)
    placeholder_text = <i>Password or fingerprint</i>
    check_color = rgb(215, 153, 33)
    fail_color = rgb(204, 36, 29)
    fail_text = <i>$FAIL</i>
    fade_on_empty = true
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = $FPRINTPROMPT
    color = rgba(168, 153, 132, 0.8)
    font_size = 13
    font_family = MesloLGS Nerd Font
    position = 0, -136
    halign = center
    valign = center
}
